<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOYO ZOMBIE | ELITE SERVER</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --dark: #050505; --card: #121212; --text: #ffffff; --green: #28a745; --orange: #ff9800; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: all 0.3s ease; }
        body { background-color: var(--dark); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }
        .main-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images8.alphacoders.com/605/605592.jpg'); background-size: cover; z-index: -1; }

        /* Navigation */
        nav { background: rgba(0, 0, 0, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 2px solid var(--primary); box-shadow: 0 5px 20px rgba(255,0,0,0.2); }
        .nav-links { display: flex; list-style: none; align-items: center; }
        .nav-links li { margin: 0 15px; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; }
        .nav-links a:hover { color: var(--primary); }
        .lang-btn { background: var(--primary); color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }

        /* Hero Section */
        section { padding: 120px 10% 60px; min-height: 100vh; }
        .hero { text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hero h1 { font-size: 5rem; font-weight: 900; text-shadow: 0 0 30px var(--primary); letter-spacing: 5px; }
        .hero p { font-size: 1.2rem; color: #bbb; margin-top: 10px; }

        /* Rules Grid */
        .rules-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-top: 40px; }
        .rule-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 8px; border-right: 4px solid var(--primary); font-size: 0.9rem; backdrop-filter: blur(5px); }
        .rule-item:hover { background: rgba(255,255,255,0.08); transform: translateY(-5px); }

        /* Box & Forms */
        .box { background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid #333; max-width: 650px; margin: 0 auto; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 25px; color: var(--primary); font-weight: 900; text-align: center; }
        input, select { width: 100%; padding: 15px; background: #000; border: 1px solid #444; color: white; margin-bottom: 20px; border-radius: 8px; font-size: 1rem; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        .btn { background: var(--primary); color: white; padding: 15px; border: none; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1.1rem; }
        .btn:hover { background: #ff3333; transform: scale(1.02); }
        .wait-msg { color: #888; font-size: 0.85rem; margin-top: 15px; text-align: center; font-style: italic; }

        /* Login Buttons Styling */
        .auth-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .auth-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .google-btn { background: #4285F4; }
        .google-btn:hover { background: #357ae8; }
        .facebook-btn { background: #1877F2; }
        .facebook-btn:hover { background: #166fe5; }
        .discord-btn { background: #5865F2; }
        .discord-btn:hover { background: #4752c4; }
        .user-info { text-align: center; margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; }

        /* Notifications (Toast) */
        .toast { position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; border-radius: 8px; color: white; font-weight: bold; z-index: 11000; transform: translateY(100px); opacity: 0; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-success { background: var(--green); box-shadow: 0 0 20px rgba(40,167,69,0.5); }
        .toast-error { background: var(--primary); box-shadow: 0 0 20px rgba(255,0,0,0.5); }

        /* Admin UI */
        .secret-trigger { position: fixed; bottom: 0; left: 0; width: 30px; height: 30px; z-index: 9999; cursor: crosshair; }
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #080808; z-index: 10000; padding: 50px 5%; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #111; }
        th, td { border: 1px solid #222; padding: 15px; text-align: center; }
        th { background: var(--primary); color: white; }
        .action-btn { padding: 8px 15px; margin: 3px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 0.8rem; }
        .accept { background: var(--green); color: white; }
        .reject { background: var(--orange); color: white; }
        .delete { background: #555; color: white; }
        .delete-all { background: #ff0000; padding: 20px; font-size: 1.2rem; color: white; border: none; width: 100%; cursor: pointer; font-weight: 900; margin-bottom: 20px; }

        /* Status Result */
        .status-card { margin-top: 30px; padding: 20px; border-radius: 10px; font-weight: 900; text-transform: uppercase; display: none; text-align: center; font-size: 1.5rem; border: 2px solid; }

        /* LTR Logic */
        [dir="ltr"] .rule-item { border-right: none; border-left: 4px solid var(--primary); text-align: left; }
    </style>
</head>
<body>

    <div class="main-bg"></div>

    <!-- الإشعارات -->
    <div id="toast" class="toast"></div>

    <nav>
        <div class="logo">YOYO <span>ZOMBIE</span></div>
        <ul class="nav-links">
            <li><a onclick="showSec('home')" id="ln-home">الرئيسية</a></li>
            <li><a onclick="showSec('rules-sec')" id="ln-rules">القوانين</a></li>
            <li><a onclick="showSec('apply-sec')" id="ln-apply">التقديم</a></li>
            <li><a onclick="showSec('status-sec')" id="ln-status">حالة الطلب</a></li>
            <li><button class="lang-btn" onclick="toggleLang()">EN</button></li>
        </ul>
    </nav>

    <!-- الرئيسية -->
    <section id="home" class="hero">
        <h1 id="h-title">YOYO ZOMBIE</h1>
        <p id="h-desc">الأداء الأقوى ونظام الحفظ الحقيقي في الشرق الأوسط</p>
    </section>

    <!-- القوانين -->
    <section id="rules-sec" style="display:none">
        <h2 id="r-title">قوانين السيرفر الصارمة</h2>
        <div class="rules-grid" id="rules-container"></div>
    </section>

    <!-- التقديم -->
    <section id="apply-sec" style="display:none">
        <div class="box">
            <h2 id="a-title">طلب رتبة (VIP / ADMIN)</h2>
            
            <!-- أزرار تسجيل الدخول -->
            <div id="authSection" class="auth-container">
                <button class="auth-btn google-btn" onclick="login('google')">
                    <i class="fab fa-google"></i> تسجيل الدخول بواسطة Google
                </button>
                <button class="auth-btn facebook-btn" onclick="login('facebook')">
                    <i class="fab fa-facebook-f"></i> تسجيل الدخول بواسطة Facebook
                </button>
                <button class="auth-btn discord-btn" onclick="login('discord')">
                    <i class="fab fa-discord"></i> تسجيل الدخول بواسطة Discord
                </button>
            </div>

            <div id="userInfo" class="user-info" style="display:none"></div>

            <form id="applyForm">
                <input type="text" id="pName" placeholder="الاسم" required>
                <input type="text" id="pSteam" placeholder="SteamID (STEAM_0:X:XXXXX)" required>
                <select id="pRank">
                    <option value="VIP">VIP MEMBER</option>
                    <option value="ADMIN">SERVER ADMIN</option>
                </select>
                <button type="submit" class="btn" id="a-btn">إرسال الطلب الآن</button>
                <p class="wait-msg" id="a-wait">سيتم الرد خلال 12 إلى 16 ساعة كحد أقصى</p>
            </form>
        </div>
    </section>

    <!-- فحص الحالة -->
    <section id="status-sec" style="display:none">
        <div class="box">
            <h2 id="s-title">تتبع حالة طلبك</h2>
            <input type="text" id="checkSteam" placeholder="أدخل SteamID الخاص بك">
            <button class="btn" onclick="checkMyStatus()" id="s-btn">فحص النتيجة</button>
            <div id="statusResult" class="status-card"></div>
        </div>
    </section>

    <!-- الباب السري للأدمن -->
    <div class="secret-trigger" onclick="openAdmin()"></div>

    <!-- لوحة التحكم -->
    <div id="adminPanel">
        <button class="btn" onclick="closeAdmin()" style="background:#222; margin-bottom:20px; width:auto; padding:10px 30px">إغلاق ×</button>
        <button class="delete-all" onclick="deleteAllOrders()">⚠ مسح جميع سجلات السيرفر نهائياً</button>
        <table id="adminTable">
            <thead>
                <tr>
                    <th>اللاعب</th>
                    <th>الرتبة</th>
                    <th>SteamID</th>
                    <th>الحالة</th>
                    <th>التحكم</th>
                </tr>
            </thead>
            <tbody id="adminData"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, OAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAe60wvodzesTpYFtHL0uqfK0d-CkCf6m8",
            authDomain: "yoyo-ac91d.firebaseapp.com",
            projectId: "yoyo-ac91d",
            storageBucket: "yoyo-ac91d.firebasestorage.app",
            messagingSenderId: "516556539375",
            appId: "1:516556539375:web:2f3eb952fd0a90bdb6a21a",
            measurementId: "G-BVNWF8TR3L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- نظام تسجيل الدخول ---
        window.login = async (providerName) => {
            let provider;
            if (providerName === 'google') provider = new GoogleAuthProvider();
            else if (providerName === 'facebook') provider = new FacebookAuthProvider();
            else if (providerName === 'discord') provider = new OAuthProvider('oidc.discord');

            try {
                const result = await signInWithPopup(auth, provider);
                notify(`مرحباً بك ${result.user.displayName}`);
            } catch (error) {
                notify("فشل تسجيل الدخول: " + error.message, "error");
            }
        };

        onAuthStateChanged(auth, (user) => {
            const authSection = document.getElementById('authSection');
            const userInfo = document.getElementById('userInfo');
            if (user) {
                authSection.style.display = 'none';
                userInfo.style.display = 'block';
                userInfo.innerHTML = `مسجل الدخول باسم: <b>${user.displayName}</b>`;
                document.getElementById('pName').value = user.displayName;
            } else {
                authSection.style.display = 'flex';
                userInfo.style.display = 'none';
            }
        });

        // --- نظام اللغات والقوانين ---
        const langData = {
            ar: {
                home: "الرئيسية", rules: "القوانين", apply: "التقديم", status: "حالة الطلب",
                h_title: "YOYO ZOMBIE", h_desc: "الأداء الأقوى ونظام الحفظ الحقيقي في الشرق الأوسط",
                r_title: "قوانين السيرفر (20)", a_title: "طلب رتبة (VIP / ADMIN)", a_btn: "إرسال الطلب الآن",
                a_wait: "سيتم الرد خلال 12 إلى 16 ساعة كحد أقصى", s_title: "تتبع حالة طلبك", s_btn: "فحص النتيجة",
                p_name: "الاسم داخل اللعبة", p_steam: "SteamID (STEAM_0:X:XXXXX)",
                rules_list: [
                    "يمنع استخدام الهاك بكافة أنواعه (باند نهائي)", "احترام الأدمنية واللاعبين واجب", "يمنع السب والشتم في الشات", "يمنع عمل بلوك (Block) للاعبين", "يمنع التخريب المتعمد على الفريق", 
                    "يمنع استغلال الثغرات البرمجية في المابات", "يمنع طلب الرتب من الأدمن داخل اللعبة", "يمنع تغيير الفريق بشكل متكرر عمداً", 
                    "يمنع إزعاج اللاعبين في المايكروفون", "التزم باللعب مع فريقك لتحقيق الفوز", "يمنع كشف أماكن المختبئين للخصم", "يمنع الوقوف AFK لفترات طويلة",
                    "احترام القوانين هو أساس البقاء بالسيرفر", "يمنع تخريب الأسلحة أو الموارد", "يمنع استخدام أسماء مسيئة أو عنصرية", "التزم بتعليمات الأدمن المسؤول فوراً",
                    "يمنع محاولة سرقة أو اختراق الحسابات", "يمنع الإعلان عن سيرفرات أخرى نهائياً", "يمنع انتحال شخصية الأدمنية", "استمتع بروح المنافسة الشريفة"
                ]
            },
            en: {
                home: "Home", rules: "Rules", apply: "Apply", status: "Status",
                h_title: "YOYO ZOMBIE", h_desc: "Best performance and real saving system",
                r_title: "Server Rules (20)", a_title: "Request Rank", a_btn: "Send Request Now",
                a_wait: "Response within 12-16 hours max", s_title: "Track Your Request", s_btn: "Check Result",
                p_name: "In-game Name", p_steam: "Your SteamID",
                rules_list: [
                    "No Hacking (Permanent Ban)", "Respect all players and admins", "No swearing in chat", "No blocking players", "No intentional griefing",
                    "No Bug/Map abuse", "Don't ask for ranks ingame", "No intentional team switching",
                    "No Microphone spamming", "Play with your team to win", "No Ghosting (Location Reveal)", "No long AFK standing",
                    "Following rules is mandatory", "Don't ruin map resources", "No offensive or racist names", "Follow admin orders immediately",
                    "No account theft attempts", "No advertising other servers", "No impersonating admins", "Enjoy and play fair"
                ]
            }
        };

        let currentLang = 'ar';
        window.toggleLang = () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('htmlTag').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            updateUI();
        };

        function updateUI() {
            const d = langData[currentLang];
            document.getElementById('ln-home').innerText = d.home;
            document.getElementById('ln-rules').innerText = d.rules;
            document.getElementById('ln-apply').innerText = d.apply;
            document.getElementById('ln-status').innerText = d.status;
            document.getElementById('h-title').innerText = d.h_title;
            document.getElementById('h-desc').innerText = d.h_desc;
            document.getElementById('r-title').innerText = d.r_title;
            document.getElementById('a-title').innerText = d.a_title;
            document.getElementById('a-btn').innerText = d.a_btn;
            document.getElementById('a-wait').innerText = d.a_wait;
            document.getElementById('s-title').innerText = d.s_title;
            document.getElementById('s-btn').innerText = d.s_btn;
            document.getElementById('pName').placeholder = d.p_name;
            document.getElementById('pSteam').placeholder = d.p_steam;
            
            let rHtml = "";
            d.rules_list.forEach((r, i) => rHtml += `<div class="rule-item"><b>${i+1}.</b> ${r}</div>`);
            document.getElementById('rules-container').innerHTML = rHtml;
        }
        updateUI();

        window.showSec = (id) => {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        };

        // --- نظام الإشعارات ---
        function notify(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `toast show toast-${type}`;
            setTimeout(() => t.className = 'toast', 4000);
        }

        // --- إرسال الطلب مع نظام الحماية ---
        document.getElementById('applyForm').onsubmit = async (e) => {
            e.preventDefault();
            const steamId = document.getElementById('pSteam').value.trim();
            const threeDaysAgo = Date.now() - (3 * 24 * 60 * 60 * 1000);

            const q = query(collection(db, "orders"), where("steam", "==", steamId), where("time", ">", threeDaysAgo));
            const snap = await getDocs(q);

            if (snap.size >= 3) {
                notify("عذراً! لقد وصلت للحد الأقصى (3 طلبات كل 3 أيام). حاول لاحقاً.", "error");
                return;
            }

            await addDoc(collection(db, "orders"), {
                name: document.getElementById('pName').value,
                steam: steamId,
                rank: document.getElementById('pRank').value,
                status: "Pending",
                time: Date.now(),
                userId: auth.currentUser ? auth.currentUser.uid : "guest"
            });

            notify("تم إرسال طلبك بنجاح! سيتم الرد قريباً.");
            document.getElementById('applyForm').reset();
        };

        // --- فحص حالة الطلب ---
        window.checkMyStatus = async () => {
            const sid = document.getElementById('checkSteam').value.trim();
            const q = query(collection(db, "orders"), where("steam", "==", sid), orderBy("time", "desc"), limit(1));
            const snap = await getDocs(q);
            const resDiv = document.getElementById('statusResult');
            resDiv.style.display = 'block';

            if(snap.empty) {
                resDiv.innerText = "لا يوجد طلب بهذا المعرف";
                resDiv.style.color = "white"; resDiv.style.borderColor = "#444";
            } else {
                const data = snap.docs[0].data();
                resDiv.innerText = data.status;
                if(data.status === "Accepted") { resDiv.style.color = "var(--green)"; resDiv.style.borderColor = "var(--green)"; }
                else if(data.status === "Rejected") { resDiv.style.color = "var(--primary)"; resDiv.style.borderColor = "var(--primary)"; }
                else { resDiv.style.color = "var(--orange)"; resDiv.style.borderColor = "var(--orange)"; }
            }
        };

        // --- لوحة التحكم ---
        window.openAdmin = () => {
            if(prompt("كلمة السر الإدارية:") === "yoyo020118") {
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminData();
            }
        };

        async function loadAdminData() {
            const snap = await getDocs(query(collection(db, "orders"), orderBy("time", "desc")));
            const tbody = document.getElementById('adminData');
            tbody.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                tbody.innerHTML += `
                    <tr>
                        <td>${d.name}</td>
                        <td style="font-weight:bold; color:var(--primary)">${d.rank}</td>
                        <td style="font-size:0.8rem">${d.steam}</td>
                        <td><span style="color:${d.status === 'Accepted' ? 'var(--green)' : 'var(--orange)'}">${d.status}</span></td>
                        <td>
                            <button class="action-btn accept" onclick="updateStatus('${docSnap.id}', 'Accepted')"><i class="fas fa-check"></i> Accept</button>
                            <button class="action-btn reject" onclick="updateStatus('${docSnap.id}', 'Rejected')"><i class="fas fa-times"></i> Reject</button>
                            <button class="action-btn delete" onclick="deleteOrder('${docSnap.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        window.updateStatus = async (id, stat) => {
            await updateDoc(doc(db, "orders", id), { status: stat });
            notify("تم تحديث الحالة بنجاح");
            loadAdminData();
        };

        window.deleteOrder = async (id) => {
            if(confirm("هل أنت متأكد من مسح هذا الطلب؟")) {
                await deleteDoc(doc(db, "orders", id));
                loadAdminData();
            }
        };

        window.deleteAllOrders = async () => {
            if(confirm("تحذير! سيتم مسح كافة البيانات من السيرفر، هل أنت متأكد؟")) {
                const snap = await getDocs(collection(db, "orders"));
                snap.forEach(async (d) => await deleteDoc(doc(db, "orders", d.id)));
                notify("تم تصفير قاعدة البيانات");
                loadAdminData();
            }
        };

        window.closeAdmin = () => document.getElementById('adminPanel').style.display = 'none';
    </script>
</body>
</html>
